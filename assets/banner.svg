<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <style>
    @keyframes bgParallax {
      0% {
        transform: translate(-12px, -8px) scale(1.06);
      }
      50% {
        transform: translate(12px, 8px) scale(1.06);
      }
      100% {
        transform: translate(-12px, -8px) scale(1.06);
      }
    }
    @keyframes hudParallax {
      0% {
        transform: translate(16px, 10px);
      }
      50% {
        transform: translate(-16px, -10px);
      }
      100% {
        transform: translate(16px, 10px);
      }
    }
    @keyframes shine {
      0% {
        transform: translateX(-100%) translateY(-100%) rotate(35deg);
      }
      30% {
        transform: translateX(-100%) translateY(-100%) rotate(35deg);
      }
      70% {
        transform: translateX(100%) translateY(100%) rotate(35deg);
      }
      100% {
        transform: translateX(100%) translateY(100%) rotate(35deg);
      }
    }
    .card-container {
      width: 100%;
      height: 100%;
    }
    .bg-image {
      animation: bgParallax 7s ease-in-out infinite;
      transform-origin: center center;
    }
    .hud-overlay {
      animation: hudParallax 7s ease-in-out infinite;
      transform-origin: center center;
    }
    .shine-effect {
      animation: shine 6s ease-in-out infinite;
      mix-blend-mode: overlay;
      opacity: 0.25;
      transform-origin: center center;
    }
  </style>
  
  <clipPath id="cardClip">
    <rect x="0" y="0" width="1200" height="400" rx="8" ry="8" />
  </clipPath>
  
  <g clip-path="url(#cardClip)">
    <g class="card-container">
      <!-- Background Image (Raw GitHub URL guarantees fetching through camo proxy) -->
      <g class="bg-image">
        <image href="https://raw.githubusercontent.com/Falconbeast21k/city-of-Egypt/main/assets/banner.png" x="-20" y="-20" width="1240" height="440" preserveAspectRatio="xMidYMid slice" />
      </g>
      
      <!-- Shine Reflection Overlay -->
      <rect class="shine-effect" x="-600" y="-400" width="2400" height="1200" fill="url(#shineGrad)" pointer-events="none" />
      
      <!-- Foreground HUD & Borders -->
      <g class="hud-overlay">
        <!-- Outer border -->
        <rect x="25" y="25" width="1150" height="350" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.35" />
        
        <!-- HUD Corners -->
        <!-- Top Left -->
        <path d="M 20 45 L 20 20 L 45 20" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.85" />
        <!-- Top Right -->
        <path d="M 1180 45 L 1180 20 L 1155 20" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.85" />
        <!-- Bottom Left -->
        <path d="M 20 355 L 20 380 L 45 380" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.85" />
        <!-- Bottom Right -->
        <path d="M 1180 355 L 1180 380 L 1155 380" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.85" />
        
        <!-- Text and HUD details -->
        <rect x="40" y="340" width="345" height="24" fill="rgba(6,3,0,0.7)" rx="4" stroke="rgba(255,215,0,0.2)" stroke-width="1" />
        <text x="52" y="356" fill="#ffd700" font-family="monospace" font-size="11.5" letter-spacing="1.5" opacity="0.9" text-shadow="0 0 4px #e8900a">SYS.IMG_09 // 3D_PARALLAX_ACTIVE</text>
      </g>
    </g>
  </g>
  
  <defs>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="40%" stop-color="white" stop-opacity="0" />
      <stop offset="50%" stop-color="white" stop-opacity="0.75" />
      <stop offset="60%" stop-color="white" stop-opacity="0" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>
